name: PHP Logic Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  php-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Run PHP logic tests
        working-directory: dev
        run: bash tests/php/run_all.sh
